name: Architecture Auditor

# Weekly, the "is it built right" agent. It examines HOW the app is BUILT
# (architecture, performance, security, data, accessibility, connections) — never
# whether it runs (smoke/health/data-guardian cover that). It maps findings,
# ranks them by impact ÷ effort, emails Niv a Hebrew report, and files ONE rolling
# GitHub issue labeled "architecture". It NEVER changes code and NEVER opens PRs —
# Niv decides what enters the queue.

on:
  schedule:
    - cron: '0 5 * * 0'   # 05:00 UTC every Sunday
  workflow_dispatch:

concurrency:
  group: arch-auditor
  cancel-in-progress: false

permissions:
  contents: read          # read the repo only — no write scope, cannot open PRs
  issues: write           # to file/update the rolling "architecture" issue

jobs:
  auditor:
    runs-on: ubuntu-latest
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install deps so `npm audit --json` can resolve the advisory database.
      - name: Install dependencies
        run: npm ci

      # Build so the auditor can measure the real bundle chunk sizes in dist/.
      - name: Build
        run: npm run build

      - name: Run Architecture Auditor
        id: audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/arch-auditor.mjs

      - name: Email audit report
        if: ${{ steps.audit.outputs.findings != '0' && env.MAIL_USERNAME != '' && env.MAIL_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: SwingEdge Architecture Auditor <${{ secrets.MAIL_USERNAME }}>
          to: niveven183@gmail.com
          subject: "🏗️ SwingEdge — ביקורת ארכיטקטורה (${{ steps.audit.outputs.date }})"
          body: ${{ steps.audit.outputs.email_he }}

      - name: Note missing mail secrets
        if: ${{ steps.audit.outputs.findings != '0' && (env.MAIL_USERNAME == '' || env.MAIL_PASSWORD == '') }}
        run: echo "::warning::MAIL_USERNAME/MAIL_PASSWORD not set — email skipped, findings are in the job summary above."

      - name: Create or update architecture issue
        if: ${{ steps.audit.outputs.findings != '0' }}
        uses: actions/github-script@v7
        env:
          FINDINGS: ${{ steps.audit.outputs.findings }}
          RUN_DATE: ${{ steps.audit.outputs.date }}
          TABLE: ${{ steps.audit.outputs.issue_table }}
        with:
          script: |
            const label = 'architecture';
            const { owner, repo } = context.repo;

            // Ensure the label exists (create it if missing).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: label, color: '5319e7',
                  description: 'Automated architecture/perf/security audit findings',
                });
              } else { throw e; }
            }

            const n = process.env.FINDINGS;
            const date = process.env.RUN_DATE;
            const body = [
              `🏗️ **Architecture Auditor** found **${n}** finding(s) on ${date}, ranked by impact ÷ effort.`,
              '',
              process.env.TABLE,
              '',
              '_Read-only audit — evidence is a file:line location only, never a value or secret._',
              '_This agent never changes code and never opens PRs; Niv decides what enters the queue._',
              '',
              `_Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}_`,
            ].join('\n');
            const title = `🏗️ Architecture Auditor — ${n} findings (${date})`;

            // Reuse the single rolling issue carrying the label; otherwise open one.
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 1,
            });
            if (existing.data.length > 0) {
              const num = existing.data[0].number;
              await github.rest.issues.update({ owner, repo, issue_number: num, title, body });
              await github.rest.issues.createComment({
                owner, repo, issue_number: num,
                body: `🔄 Refreshed ${date}: ${n} finding(s). See the ranked table in the body above.`,
              });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
            }
