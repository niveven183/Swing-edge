name: Health Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

concurrency:
  group: health-monitor
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Curl production /api/health
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
        run: |
          set -euo pipefail
          URL="${HEALTH_URL:-https://swing-edge.com/api/health}"
          code="$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 20 --retry 2 --retry-delay 5 "$URL")"
          echo "HTTP $code"
          cat /tmp/health.json
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Health check failed (HTTP $code)"
            exit 1
          fi
