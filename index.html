<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SwingEdge — היומן החכם לסוחרי סווינג</title>
    <meta name="description" content="SwingEdge — היומן החכם לסוחרי סווינג. AI Coach, ניהול סיכון, וחיפוש עסקאות בזמן אמת." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#070B0A" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SwingEdge" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO: canonical + hreflang (bilingual SPA — same URL serves he + en) -->
    <link rel="canonical" href="https://swing-edge.com/" />
    <link rel="alternate" hreflang="he" href="https://swing-edge.com/" />
    <link rel="alternate" hreflang="en" href="https://swing-edge.com/" />
    <link rel="alternate" hreflang="x-default" href="https://swing-edge.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="SwingEdge — הפסקת לנחש." />
    <meta property="og:description" content="היומן שלומד אותך ומלמד אותך בזמן אמת. מאמן מסחר אישי, לא עוד רישום עסקאות." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://swing-edge.com/" />
    <!-- TODO: replace with a dedicated 1200×630 share image; icon-512.png is a square placeholder -->
    <meta property="og:image" content="https://swing-edge.com/icon-512.png" />
    <meta property="og:site_name" content="SwingEdge" />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwingEdge — הפסקת לנחש." />
    <meta name="twitter:description" content="היומן שלומד אותך ומלמד אותך בזמן אמת." />
    <meta name="twitter:image" content="https://swing-edge.com/icon-512.png" />

    <!-- Keywords -->
    <meta name="keywords" content="trading journal, swing trading journal, trade tracker, risk management, AI trading coach, trade analytics, trading psychology, day trading journal, יומן מסחר, סוחר סווינג, ניהול סיכון מסחר, יומן טריידינג, מאמן מסחר AI, ניתוח עסקאות, פסיכולוגיית מסחר" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400&family=Inter:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SwingEdge",
      "url": "https://swing-edge.com/",
      "description": "The smart trading journal for swing traders. AI coach, risk management & real-time trade search. יומן מסחר חכם לסוחרי סווינג עם AI Coach וניהול סיכון.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "inLanguage": ["he", "en"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier available"
      },
      "author": {
        "@type": "Organization",
        "name": "SwingEdge"
      }
    }
    </script>

    <!-- Pre-paint theme resolver: apply the saved theme before first paint so the boot
         loader (and app) never flash the wrong background. Mirrors ThemeContext logic. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('swingedge-theme-mode');
          if (m !== 'light' && m !== 'dark' && m !== 'auto') {
            var lg = localStorage.getItem('swingEdgeLightMode');
            m = lg === 'true' ? 'light' : lg === 'false' ? 'dark' : 'auto';
          }
          var dark = m === 'dark' ||
            (m === 'auto' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <!-- Boot loader styling: shown inside #root while the JS bundle loads so the page is
         never a blank white/dark rectangle. React clears #root on mount, removing it. -->
    <style>
      :root { --se-boot-bg:#F8FAF7; --se-boot-accent:#00C805; --se-boot-track:rgba(0,200,5,0.16); --se-boot-fg:#0B1F12; }
      html.dark { --se-boot-bg:#0d1424; --se-boot-accent:#10B981; --se-boot-track:rgba(16,185,129,0.18); --se-boot-fg:#E8F0EA; }
      #se-boot { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; background:var(--se-boot-bg); z-index:2147483647; }
      #se-boot .se-boot__spin { width:34px; height:34px; border-radius:50%; border:3px solid var(--se-boot-track); border-top-color:var(--se-boot-accent); animation:se-boot-spin .8s linear infinite; }
      #se-boot .se-boot__mark { font-family:'General Sans','Inter',system-ui,-apple-system,sans-serif; font-weight:700; font-size:19px; letter-spacing:.01em; color:var(--se-boot-fg); animation:se-boot-pulse 1.4s ease-in-out infinite; }
      #se-boot .se-boot__mark b { color:var(--se-boot-accent); font-weight:700; }
      @keyframes se-boot-spin { to { transform:rotate(360deg); } }
      @keyframes se-boot-pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }
      @media (prefers-reduced-motion: reduce) {
        #se-boot .se-boot__spin { animation-duration:1.6s; }
        #se-boot .se-boot__mark { animation:none; opacity:.85; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="se-boot" role="status" aria-live="polite" aria-label="Loading SwingEdge">
        <div class="se-boot__spin"></div>
        <div class="se-boot__mark">Swing<b>Edge</b></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
